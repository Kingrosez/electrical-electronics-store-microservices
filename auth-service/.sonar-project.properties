# SonarQube Project Configuration
sonar.projectKey=auth-service
sonar.projectName=Auth Service
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java version
sonar.java.source=17
sonar.java.target=17

# Exclude generated and test files from coverage
sonar.coverage.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/exception/**,\
  **/entity/**,\
  **/repository/**,\
  **/*MapperImpl.java,\
  **/ElectroShopApplication.java,\
  **/Test*.java

# Test inclusions
sonar.tests.inclusions=**/*Test.java,**/*Tests.java

# Coverage settings
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Quality gate settings
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Issues configuration
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1135
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.java
sonar.issue.ignore.multicriteria.e1.message=Track TODO comments
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S125
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.java
sonar.issue.ignore.multicriteria.e2.message=Ignore commented code in development