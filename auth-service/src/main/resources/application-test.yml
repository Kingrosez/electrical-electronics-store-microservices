spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-timeout: 10000

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 1000ms
      lettuce:
        pool:
          max-active: 2
          max-idle: 1
          min-idle: 0

server:
  port: 0  # Random port for tests
  shutdown: immediate

logging:
  level:
    root: INFO
    com.eande.store.auth_service: DEBUG
    org.springframework.test: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} | %-5level | %msg%n"

jwt:
  secret: testSecretKey123456789012345678901234567890123456789012345678901234567890
  algorithm: HS512
  access-token-expiration: 900
  refresh-token-expiration: 604800

auth:
  max-failed-attempts: 3  # Lower for faster tests
  account-lockout-duration-minutes: 1

services:
  user-service:
    url: http://localhost:9999

# Test specific configuration
test:
  mock:
    user-service: true
  performance:
    enabled: false
  security:
    disabled: false