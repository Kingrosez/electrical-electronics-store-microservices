spring:
  config:
    activate:
      on-profile: staging

  datasource:
    url: ${DB_URL:jdbc:postgresql://staging-db:5432/auth_db}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: AuthServiceHikariPool-Staging
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true
    clean-disabled: true

  data:
    redis:
      host: ${REDIS_HOST:staging-redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      client-name: auth-service-staging
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

server:
  port: 8080
  tomcat:
    threads:
      max: 50
      min-spare: 10
    accesslog:
      enabled: true
      directory: /var/log/tomcat
      pattern: common
      prefix: access_log
      suffix: .log
      rotate: true
    connection-timeout: 20000ms
    max-connections: 200

logging:
  level:
    root: INFO
    com.eande.store.auth_service: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.springframework.cloud.openfeign: INFO
  file:
    path: /var/log/auth-service
    name: /var/log/auth-service/${spring.application.name}.log
    max-size: 50MB
    max-history: 14
    total-size-cap: 500MB
  pattern:
    console: "%d{ISO8601} | %-5level | [%thread] | %logger{36} | %msg%n"
    file: "%d{ISO8601} | %-5level | [%thread] | %logger{36} | %msg%n"

jwt:
  secret: ${JWT_SECRET}
  algorithm: HS512
  access-token-expiration: 900
  refresh-token-expiration: 604800

auth:
  max-failed-attempts: 5
  account-lockout-duration-minutes: 15
  allowed-origins: ${ALLOWED_ORIGINS:https://staging.example.com}

services:
  user-service:
    url: ${USER_SERVICE_URL}
    connection-timeout: 5000
    read-timeout: 10000

resilience4j:
  circuitbreaker:
    instances:
      userService:
        register-health-indicator: true
        sliding-window-size: 20
        minimum-number-of-calls: 10
        permitted-number-of-calls-in-half-open-state: 5
        wait-duration-in-open-state: 10s
        failure-rate-threshold: 50
  retry:
    instances:
      userService:
        max-attempts: 2
        wait-duration: 2s

info:
  app:
    name: ${spring.application.name}
    version: ${project.version}
    description: Authentication Service
    environment: staging