spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: auth_user
    password: auth_password
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: AuthServiceHikariPool-Dev
      auto-commit: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    locations: classpath:db/migration
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      password:
      timeout: 2000ms
      connect-timeout: 2000ms
      client-name: auth-service-dev
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
        shutdown-timeout: 100ms

  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop
      start:
        command: up
        log-level: info
      stop:
        command: down
        timeout: 10s

server:
  port: 8080
  tomcat:
    threads:
      max: 10
      min-spare: 5
    accesslog:
      enabled: true
      directory: logs/dev
      pattern: '%h %l %u %t "%r" %s %b %D'
      prefix: access_log
      suffix: .log
      rotate: true
      rename-on-rotate: true
    connection-timeout: 20000ms
    max-connections: 100
    accept-count: 20

logging:
  level:
    root: DEBUG
    com.eande.store.auth_service: TRACE
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.springframework.web.servlet: DEBUG
    org.springframework.boot: INFO
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.engine.transaction: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    feign: DEBUG
    org.springframework.cache: TRACE
    org.springframework.data.redis: DEBUG
  file:
    path: logs/dev
    name: logs/dev/${spring.application.name}.log
    max-size: 10MB
    max-history: 7
    total-size-cap: 100MB
  pattern:
    console: "%d{ISO8601} | %highlight(%-5level) | [%thread] | %cyan(%logger{36}) | %msg%n"
    file: "%d{ISO8601} | %-5level | [%thread] | %logger{36} | %msg%n"

jwt:
  secret: ${JWT_SECRET:devSecretKey123456789012345678901234567890123456789012345678901234567890}
  algorithm: HS512
  access-token-expiration: 900
  refresh-token-expiration: 604800

auth:
  max-failed-attempts: 5
  account-lockout-duration-minutes: 15
  allowed-origins: http://localhost:3000,http://localhost:5173,http://localhost:4200

services:
  user-service:
    url: ${USER_SERVICE_URL:http://localhost:8081}
    connection-timeout: 3000
    read-timeout: 5000

resilience4j:
  circuitbreaker:
    instances:
      userService:
        register-health-indicator: true
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
  retry:
    instances:
      userService:
        max-attempts: 3
        wait-duration: 1s
        retry-exceptions:
          - feign.RetryableException
          - java.net.SocketTimeoutException
          - java.io.IOException

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: Authentication Service
    environment: development