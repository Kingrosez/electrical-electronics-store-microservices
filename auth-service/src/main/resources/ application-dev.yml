spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.eande.store.auth_service: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    path: logs/dev
    max-size: 10MB
    max-history: 7