spring:
  application:
    name: auth-service
  profiles:
    active: dev  # Default profile, overridden by SPRING_PROFILES_ACTIVE

# Common configuration across all profiles
server:
  error:
    include-message: always
    include-binding-errors: always
  shutdown: graceful

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    doc-expansion: none

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}