spring:
  application:
    name: electro-shop
  profiles:
    active: dev

---
# DEV Profile
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/electrodb
    username: electro_user
    password: dev_password_only
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop

server:
  port: 8080

logging:
  level:
    com.electro: DEBUG
    org.springframework.security: DEBUG

jwt:
  secret: ${JWT_SECRET:devSecretKey123456789012345678901234567890123456789012345678901234567890}
  algorithm: HS512
  access-token-expiration: 900
  refresh-token-expiration: 604800

auth:
  max-failed-attempts: 5
  account-lockout-duration-minutes: 15

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

---
# STAGING Profile
spring:
  config:
    activate:
      on-profile: staging
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/electrodb}
    username: ${DB_USER:electro_user}
    password: ${DB_PASSWORD:change_me}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  tomcat:
    threads:
      max: 100
      min-spare: 10
    accesslog:
      enabled: true
      directory: /var/log/tomcat

logging:
  level:
    com.electro: INFO
    org.springframework.security: WARN

jwt:
  secret: ${JWT_SECRET}
  algorithm: HS512
  access-token-expiration: 900
  refresh-token-expiration: 604800

auth:
  max-failed-attempts: 5
  account-lockout-duration-minutes: 15

---
# PRODUCTION Profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
  flyway:
    enabled: true
    baseline-on-migrate: false

server:
  port: 8080
  tomcat:
    threads:
      max: 200
      min-spare: 20
    accesslog:
      enabled: true
      directory: /var/log/tomcat
      pattern: common
      rotate: true

logging:
  level:
    com.electro: WARN
    org.springframework: WARN
  pattern:
    file: "%d{ISO8601} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /var/log/electro-shop/application.log

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

jwt:
  secret: ${JWT_SECRET}
  algorithm: HS512
  access-token-expiration: 900
  refresh-token-expiration: 604800

auth:
  max-failed-attempts: 5
  account-lockout-duration-minutes: 15